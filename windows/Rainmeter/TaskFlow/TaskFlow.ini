[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1

[Variables]
FontName=Segoe UI
FontSize=11
TextColor=255,255,255,255
BgColor=25,25,30,220
BorderColor=60,60,75,180
CornerRadius=20
RepoPath=#SETTINGSPATH#..\TaskFlow-Sync\todo.json

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,320,400,#CornerRadius# | Fill Color #BgColor# | Stroke Color #BorderColor# | StrokeWidth 1

[MeterHeader]
Meter=String
Text="TaskFlow"
FontFace=#FontName#
FontSize=14
FontWeight=600
FontColor=#TextColor#
X=20
Y=16

[MeterSubtitle]
Meter=String
Text="GitHub-Backed Task Manager"
FontFace=#FontName#
FontSize=9
FontColor=180,180,195,255
X=20
Y=42

[MeasureFileWatcher]
Measure=Plugin
Plugin=FolderInfo
Folder=#SETTINGSPATH#..\TaskFlow-Sync
RegExpFilter=todo\.json
UpdateDivider=5
